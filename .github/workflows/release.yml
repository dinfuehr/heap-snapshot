name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: win32-x64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            npm_pkg: win32-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../heap-snapshot-${{ matrix.target }}.tar.gz heap-snapshot

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../heap-snapshot-${{ matrix.target }}.zip heap-snapshot.exe

      - uses: actions/upload-artifact@v4
        with:
          name: heap-snapshot-${{ matrix.target }}
          path: heap-snapshot-${{ matrix.target }}.*

      - name: Copy binary into npm package
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/heap-snapshot.exe npm/${{ matrix.npm_pkg }}/
          else
            cp target/${{ matrix.target }}/release/heap-snapshot npm/${{ matrix.npm_pkg }}/
          fi

      - name: Publish npm platform package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/${{ matrix.npm_pkg }}
          npm publish --access public

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: heap-snapshot-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: heap-snapshot-*
          generate_release_notes: true

  npm-publish:
    name: Publish npm main package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/heap-snapshot
          npm publish --access public
